# =============================================================================
# FACTORY FIRMWARE - Guition ESP32-P4 JC8012P4A1 JD9365
# =============================================================================
# Secrets-free config for the ESPHome web installer. Boots into AP mode
# for WiFi setup via captive portal.
#
# Compiled by CI (see .github/workflows/release.yml) - not used locally.
# For local development, see devices/guition-esp32-p4-jc8012p4a1-jd9365/esphome.yaml.
# =============================================================================

substitutions:
  name: "immich-frame-10-jd9365"
  friendly_name: "Immich Frame 10inch JD9365"
  firmware_version: "0.0.0"
  espframe_component_url: "file:///config"
  espframe_component_ref: "HEAD"

packages:
  espframe: !include ../devices/guition-esp32-p4-jc8012p4a1-jd9365/packages.yaml

external_components:
  - source:
      type: local
      path: ../components
    components: [mipi_dsi]
  - source:
      type: local
      path: ../components
    components: [gsl3680, remote_image, espframe]

web_server:
  port: 80
  version: 3
  js_url: ""
  css_include: "../docs/public/webserver/style.css"
  js_include: "../docs/public/webserver/app.js"
